<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="color-scheme" content="dark" />
    <title>campfire</title>
    <link rel="stylesheet" href="/styles.css" />
    <script>
      // Apply reduced-motion before first paint (no flash of animation).
      try {
        var rm = localStorage.getItem("campfire:reduced");
        var on = rm === null ? matchMedia("(prefers-reduced-motion: reduce)").matches : rm === "1";
        if (on) document.documentElement.classList.add("reduced");
      } catch (e) {}
    </script>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>

    <div class="daybar" id="daybar">
      <div class="daybar-track" aria-hidden="true">
        <div class="daybar-fill"></div>
        <div class="daybar-marker"></div>
      </div>
      <button class="daybar-meta" id="daybar-btn" type="button" data-i18n-aria="aria_clock" aria-label="Open clock and presence">
        <span class="daybar-time">--:--</span>
        <span class="daybar-sep">·</span>
        <span class="daybar-phase">—</span>
      </button>
    </div>

    <span class="bracket bracket-tl"></span>
    <span class="bracket bracket-tr"></span>
    <span class="bracket bracket-bl"></span>
    <span class="bracket bracket-br"></span>

    <div class="title-block">
      <span class="live-dot"></span>CAMPFIRE&nbsp;/&nbsp;LIVE
    </div>

    <div class="hud" aria-live="polite">
      <div class="hud-count" id="hud-count">01</div>
      <div class="hud-label" data-i18n="present">PRESENT</div>
    </div>

    <div id="chat-air" class="chat-air" aria-live="polite"></div>

    <section id="chat" class="chat" aria-label="chat éphémère" aria-live="polite">
      <div id="chat-log" class="chat-log"></div>
      <form id="chat-form" class="chat-form" autocomplete="off">
        <input
          id="chat-input"
          class="chat-input"
          type="text"
          maxlength="140"
          placeholder="whisper…"
          data-i18n-ph="whisper"
          data-i18n-aria="whisper"
          enterkeyhint="send"
        />
        <button
          id="chat-send"
          class="chat-send"
          type="submit"
          aria-label="send"
          data-i18n-aria="send"
        >
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </button>
      </form>
    </section>

    <div class="radio" id="radio">
      <button
        class="radio-power"
        id="radio-power"
        type="button"
        aria-pressed="false"
        data-i18n-aria="aria_radio"
        aria-label="Shared radio — on/off for everyone"
      >
        <span class="radio-led" aria-hidden="true"></span>
        <span class="radio-label">RADIO</span>
      </button>
      <button
        class="icon-btn radio-mute"
        id="radio-mute"
        type="button"
        aria-pressed="false"
        aria-label="Couper le son (local)"
        hidden
      >
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path d="M4 9.5v5h3.5L12 18V6L7.5 9.5H4z" fill="currentColor" />
          <path class="snd-wave" d="M15.5 8.8a4.5 4.5 0 0 1 0 6.4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          <path class="snd-slash" d="M3.5 3.5l17 17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
      </button>
    </div>

    <div class="actions">
      <button
        class="icon-btn share-btn"
        id="share-btn"
        type="button"
        data-i18n-aria="aria_share"
        aria-label="Share the link"
      >
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="6" cy="12" r="2.4" />
          <circle cx="17" cy="6" r="2.4" />
          <circle cx="17" cy="18" r="2.4" />
          <path d="M8.1 10.9l6.8-3.8M8.1 13.1l6.8 3.8" />
        </svg>
      </button>
      <button
        class="icon-btn settings-open"
        id="settings-open"
        type="button"
        aria-haspopup="dialog"
        data-i18n-aria="aria_settings"
        aria-label="Settings"
      >
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true">
          <line x1="4" y1="8.5" x2="20" y2="8.5" />
          <line x1="4" y1="15.5" x2="20" y2="15.5" />
          <circle cx="14" cy="8.5" r="2.5" fill="var(--bg)" />
          <circle cx="9" cy="15.5" r="2.5" fill="var(--bg)" />
        </svg>
      </button>
    </div>

    <div class="modal-backdrop" id="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <span class="modal-title" id="modal-title" data-i18n="settings_title">SETTINGS</span>
          <button class="icon-btn modal-close" id="modal-close" type="button" data-i18n-aria="aria_close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-row">
            <span class="setting-name" data-i18n="s_motion">ANIMATIONS</span>
            <button class="switch" id="motion-btn" type="button" role="switch" aria-checked="true" data-i18n-aria="s_motion" aria-label="Animations">
              <span class="switch-knob" aria-hidden="true"></span>
            </button>
          </div>
          <div class="setting-row">
            <span class="setting-name" data-i18n="s_floating">FLOATING MESSAGES</span>
            <button class="switch" id="chatmode-btn" type="button" role="switch" aria-checked="true" data-i18n-aria="s_floating" aria-label="Floating messages">
              <span class="switch-knob" aria-hidden="true"></span>
            </button>
          </div>
          <div class="setting-row">
            <span class="setting-name" data-i18n="s_fire">FIRE CRACKLE</span>
            <button class="switch" id="fire-btn" type="button" role="switch" aria-checked="true" data-i18n-aria="s_fire" aria-label="Fire crackle">
              <span class="switch-knob" aria-hidden="true"></span>
            </button>
          </div>
          <div class="setting-row setting-row-volume">
            <span class="setting-name" data-i18n="s_volume">VOLUME</span>
            <input
              class="volume-slider"
              id="fire-volume"
              type="range"
              min="0"
              max="100"
              step="1"
              value="40"
              aria-label="Fire crackle volume"
              data-i18n-aria="s_volume"
            />
          </div>
          <div class="setting-row">
            <span class="setting-name" data-i18n="s_language">LANGUAGE</span>
            <div class="lang-seg" id="lang-seg" role="group" aria-label="Language">
              <button class="lang-opt" data-lang="fr" type="button">FR</button>
              <button class="lang-opt" data-lang="en" type="button">EN</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="gate" id="gate" hidden>
      <form class="gate-form" id="gate-form" autocomplete="off">
        <div class="gate-title" data-i18n="gate_title">This space is protected</div>
        <input
          class="gate-input"
          id="gate-input"
          type="password"
          placeholder="password"
          data-i18n-ph="password"
          data-i18n-aria="password"
          aria-label="password"
        />
        <button class="gate-btn" id="gate-btn" type="submit" data-i18n="enter">Enter</button>
        <div class="gate-error" id="gate-error" data-i18n="wrong_password" hidden>Wrong password</div>
      </form>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <div class="presents" id="presents" role="dialog" aria-modal="false" aria-labelledby="presents-title" hidden>
      <div class="presents-panel">
        <div class="presents-head">
          <div class="presents-title-block">
            <span class="presents-time" id="presents-time">--:--</span>
            <span class="presents-phase" id="presents-phase">—</span>
          </div>
          <button class="icon-btn presents-close" id="presents-close" type="button" data-i18n-aria="aria_close" aria-label="Close">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
              <path d="M6 6l12 12M18 6L6 18" />
            </svg>
          </button>
        </div>
        <div class="presents-body">
          <div class="presents-meta">
            <span class="presents-count" id="presents-count">00</span>
            <span class="presents-meta-label" data-i18n="present">PRESENT</span>
          </div>
          <div class="presents-list" id="presents-list"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
