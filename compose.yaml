services:
  campfire:
    # Build from source, or pull the prebuilt image instead:
    #   image: ghcr.io/cedhuf/campfire:latest   (and remove `build:`)
    build: .
    image: ghcr.io/cedhuf/campfire:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PORT: "3000"
      # Keep true behind this Traefik proxy; false if exposed directly.
      TRUST_PROXY: "true"
      MAX_CONNECTIONS: "500"
      MAX_CONNECTIONS_PER_IP: "10"
      MSG_MAX_LENGTH: "140"
      MSG_RATE_LIMIT_MS: "2200"
      # Optional gate — set a value to require a password to join.
      # ACCESS_PASSWORD: "change-me"
      # Timezone for the day/night cycle + clock (IANA name). Defaults to the
      # container's local tz when unset. Set explicitly for a stable wall-clock.
      TZ: "Europe/Paris"
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.http.routers.campfire.rule=Host(`campfire.example`)
      - traefik.http.routers.campfire.entrypoints=websecure
      - traefik.http.routers.campfire.tls=true
      - traefik.http.routers.campfire.tls.certresolver=le
      - traefik.http.services.campfire.loadbalancer.server.port=3000
      # sticky sessions for horizontal scaling (hash by IP → fixed instance)
      - traefik.http.services.campfire.loadbalancer.sticky.cookie=true
      - traefik.http.services.campfire.loadbalancer.sticky.cookie.name=campfire_node

  traefik:
    image: docker.io/traefik:v3.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=you@example.com
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge

networks:
  edge: {}

volumes:
  letsencrypt: {}
